<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Year 10 Algebra Fundamentals</title>
    <style>
        :root { --math-blue: #2c3e50; --bg-light: #f9f9f9; --game-bg: #0d1117; --card: #161b22; --border: #30363d; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        #panic-zone { position: fixed; top: 0; right: 0; width: 25px; height: 25px; z-index: 9999; background: transparent; }
        #math-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: var(--bg-light); }
        .math-container { max-width: 400px; background: white; border: 2px solid #ddd; padding: 40px; border-radius: 8px; }
        .math-input { padding: 12px; width: 80%; margin-bottom: 20px; border: 1px solid #aaa; text-align: center; }
        .solve-btn { background: var(--math-blue); color: white; border: none; padding: 12px 40px; cursor: pointer; border-radius: 4px; }
        #game-gallery { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--game-bg); color: white; z-index: 100; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 30px; }
        .square { background: var(--card); border: 1px solid var(--border); aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; position: relative; overflow: hidden; }
        .square img { width: 100%; height: 100%; object-fit: cover; }
        .square h3 { position: absolute; bottom: 0; width: 100%; margin: 0; background: rgba(0,0,0,0.8); font-size: 0.7rem; text-align: center; padding: 5px 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 200; }
        #game-frame { width: 100%; height: 100%; border: none; }
        .controls { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; gap: 10px; }
        .btn { background: rgba(255,255,255,0.2); color: white; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        #fake-study { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 5000; }
    </style>
</head>
<body>

    <div id="panic-zone" onmouseenter="togglePanic()"></div>

    <div id="math-page">
        <div class="math-container">
            <h1>Algebra Module 2</h1>
            <p>Access Code Required:</p>
            <input type="password" id="math-box" class="math-input" placeholder="Enter PIN">
            <br>
            <button class="solve-btn" onclick="checkMath()">Unlock</button>
        </div>
    </div>

    <div id="game-gallery">
        <div class="grid">
            <div class="square" onclick="play('https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://cdn.jsdelivr.net/gh/bobydigital/bitlife@main/bitlife.xml')">
                <img src="https://images.unsplash.com/photo-1533073356964-74857c68b7b9?w=200"><h3>System Tool 1 (BL)</h3>
            </div>
            <div class="square" onclick="play('https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://s3.amazonaws.com/unblocked-games/moto-x3m.xml')">
                <img src="https://images.unsplash.com/photo-1558981403-c5f9899a28bc?w=200"><h3>System Tool 2 (X3M)</h3>
            </div>
            <div class="square" onclick="play('https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://cdn.jsdelivr.net/gh/sk160/gs@main/gs.xml')">
                <img src="https://images.unsplash.com/photo-1595231712325-9fecd0e408ec?w=200"><h3>System Tool 3 (GS)</h3>
            </div>
            <div class="square" onclick="play('https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://cdn.jsdelivr.net/gh/M-G-3/DM@main/dm.xml')">
                <img src="https://images.unsplash.com/photo-1599588127264-ddf7d5a552ed?w=200"><h3>System Tool 4 (DM)</h3>
            </div>
             <div class="square" onclick="play('https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://cdn.jsdelivr.net/gh/bobydigital/2048@main/2048.xml')">
                <img src="https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?w=200"><h3>System Tool 5 (2048)</h3>
            </div>
        </div>
    </div>

    <div id="overlay">
        <iframe id="game-frame" allowfullscreen></iframe>
        <div class="controls">
            <button class="btn" onclick="document.getElementById('game-frame').requestFullscreen()">Full Screen</button>
            <button class="btn" onclick="location.reload()">Exit & Clear</button>
        </div>
    </div>

    <div id="fake-study">
        <iframe src="https://www.transum.org/Software/SW/Starter_of_the_day/Students/Equations.asp?Level=1" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <script>
        let isPanicked = false;
        let isGalleryOpen = false;

        function checkMath() {
            if (document.getElementById('math-box').value === "1234") {
                isGalleryOpen = true;
                document.getElementById('game-gallery').style.display = 'block';
                document.title = "Algebra Quiz - Transum";
            } else { alert("Access Denied."); }
        }

        function play(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('overlay').style.display = 'block';
        }

        function togglePanic() {
            if (!isGalleryOpen) return;
            isPanicked = !isPanicked;
            document.getElementById('fake-study').style.display = isPanicked ? 'block' : 'none';
            if (isPanicked) {
                let f = document.getElementById('game-frame');
                f.src = f.src; // Mutes sound
            }
        }

        window.onkeydown = (e) => {
            if (e.key === "Escape" || e.key === "~") togglePanic();
        };
    </script>
</body>
</html>
