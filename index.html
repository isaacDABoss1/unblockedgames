<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Year 10 Algebra Fundamentals</title>
    <style>
        :root {
            --math-blue: #2c3e50;
            --bg-light: #f9f9f9;
            --game-bg: #0d1117;
            --card: #161b22;
            --accent: #58a6ff;
            --border: #30363d;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'Arial', sans-serif; background: var(--bg-light); color: #333; }

        /* PANIC TOGGLE ZONE */
        #panic-zone { position: fixed; top: 0; right: 0; width: 25px; height: 25px; z-index: 5000; background: transparent; }

        /* FRONT PAGE */
        #math-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .math-container { max-width: 600px; background: white; border: 2px solid #ddd; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .math-input { padding: 12px; width: 80%; margin-bottom: 20px; border: 1px solid #aaa; font-family: monospace; text-align: center; }
        .solve-btn { background: var(--math-blue); color: white; border: none; padding: 12px 40px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        /* GALLERY */
        #game-gallery { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--game-bg); color: white; z-index: 100; overflow-y: auto; }
        .gallery-header { position: sticky; top: 0; padding: 20px; text-align: center; border-bottom: 1px solid var(--border); background: var(--card); z-index: 101; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 30px 20px 100px 20px; }
        .square { background: var(--card); border: 1px solid var(--border); aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; transition: 0.2s; overflow: hidden; position: relative; }
        .square img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        .square h3 { position: absolute; bottom: 0; width: 100%; margin: 0; background: rgba(0, 0, 0, 0.8); color: white; padding: 5px 0; font-size: 0.8rem; text-align: center; }

        /* OVERLAYS */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 200; }
        #game-frame { width: 100%; height: 100%; border: none; }

        /* CONTROLS */
        .game-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 250; }
        .control-btn { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 20px; cursor: pointer; backdrop-filter: blur(5px); }
        
        #fake-study { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 3000; }
        #study-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="panic-zone" onmouseenter="togglePanic()"></div>

    <div id="math-page">
        <div class="math-container">
            <h1>Module 2: Linear Equations</h1>
            <p>Enter Student ID to continue:</p>
            <input type="password" id="math-box" class="math-input" placeholder="####">
            <br>
            <button class="solve-btn" onclick="checkMath()">Login</button>
        </div>
    </div>

    <div id="game-gallery">
        <div class="gallery-header">
            <button onclick="logout()" style="background: #333; color: white; border: none; padding: 8px 15px; cursor: pointer; float: left; border-radius: 4px;">← Logout & Clear</button>
            <h2 style="margin: 0; display: inline-block;">Algebra Resources</h2>
        </div>
        <div class="grid">
            <div class="square" onclick="play('https://play2048.co/')"><img src="https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?w=200"><h3>2048</h3></div>
            <div class="square" onclick="play('https://classic.minecraft.net/')"><img src="https://images.unsplash.com/photo-1627398242454-45a1465c2479?w=200"><h3>Minecraft</h3></div>
            
            <div class="square" onclick="play('https://ubg77.github.io/edit/moto-x3m/')"><img src="https://images.unsplash.com/photo-1558981403-c5f9899a28bc?w=200"><h3>Moto X3M</h3></div>
            <div class="square" onclick="play('https://webglmath.github.io/drive-mad/')"><img src="https://images.unsplash.com/photo-1599588127264-ddf7d5a552ed?w=200"><h3>Drive Mad</h3></div>
            <div class="square" onclick="play('https://webglmath.github.io/gunspin/')"><img src="https://images.unsplash.com/photo-1595231712325-9fecd0e408ec?w=200"><h3>Gunspin</h3></div>
            
            <div class="square" onclick="play('https://tetris.com/play-tetris')"><img src="https://images.unsplash.com/photo-1585338663460-398d86f78479?w=200"><h3>Tetris</h3></div>
            <div class="square" onclick="play('https://v6p9d9t4.ssl.hwcdn.net/html/1513/index.html')"><img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=200"><h3>OvO</h3></div>
        </div>
    </div>

    <div id="overlay">
        <iframe id="game-frame" allowfullscreen></iframe>
        <div class="game-controls">
            <button class="control-btn" onclick="toggleFullScreen()">⛶ Full Screen</button>
            <button class="control-btn" onclick="exitGame()">✕ Close</button>
        </div>
    </div>

    <div id="fake-study"><iframe id="study-frame"></iframe></div>

    <script>
        const SECRET_CODE = "1234";
        const PANIC_SITE = "https://www.transum.org/Software/SW/Starter_of_the_day/Students/Equations.asp?Level=1";
        
        let isPanicked = false;
        let isGalleryOpen = false;

        function checkMath() {
            if (document.getElementById('math-box').value === SECRET_CODE) { 
                openGallery(); 
            } else { alert("Incorrect Student ID."); }
        }

        function openGallery() { 
            isGalleryOpen = true;
            document.getElementById('game-gallery').style.display = 'block'; 
            document.title = "Algebra Quiz - Transum";
        }

        function logout() {
            // Wipes the session and reloads to the front page
            window.location.reload();
        }

        function play(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('overlay').style.display = 'block';
        }

        function exitGame() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }

        function toggleFullScreen() {
            let elem = document.getElementById("game-frame");
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
        }

        function togglePanic() {
            if (!isGalleryOpen) return;
            if (!isPanicked) {
                document.getElementById('study-frame').src = PANIC_SITE;
                document.getElementById('fake-study').style.display = 'block';
                let gf = document.getElementById('game-frame'); 
                if (gf.src) gf.src = gf.src; 
                isPanicked = true;
            } else {
                document.getElementById('fake-study').style.display = 'none';
                document.getElementById('study-frame').src = '';
                isPanicked = false;
            }
        }

        window.addEventListener('keydown', function(e) {
            if (e.key === "Escape" || e.key === "`" || e.key === "~") { if (!isPanicked) togglePanic(); }
            if (e.shiftKey && e.key === "R") { if (isPanicked) togglePanic(); }
        });
    </script>
</body>
</html>
