<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 10 Algebra Fundamentals</title>
    <style>
        :root { --math-blue: #2c3e50; --bg: #f4f7f6; --card: #ffffff; --accent: #3498db; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: var(--bg); }
        
        /* HIDDEN PANIC SENSOR */
        #panic-trigger { position: fixed; top: 0; right: 0; width: 15px; height: 15px; z-index: 9999; cursor: pointer; }

        /* LOGIN PAGE */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        input { padding: 12px; width: 200px; border: 1px solid #ddd; border-radius: 6px; margin: 15px 0; text-align: center; font-size: 1.1rem; }
        button { background: var(--math-blue); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: 600; }

        /* DASHBOARD */
        #dashboard { display: none; height: 100vh; overflow-y: auto; padding: 40px 20px; background: #1a1a1a; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .tile { background: #2d2d2d; border: 1px solid #3d3d3d; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .tile:hover { transform: translateY(-5px); background: #3d3d3d; border-color: var(--accent); }
        .tile-icon { font-size: 2rem; margin-bottom: 10px; display: block; }

        /* GAME OVERLAY */
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 500; }
        iframe { width: 100%; height: 100%; border: none; }
        .controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .control-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 30px; cursor: pointer; backdrop-filter: blur(10px); }

        /* PANIC SCREEN */
        #panic-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 9000; }
    </style>
</head>
<body>

<div id="panic-trigger" onclick="togglePanic()"></div>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--math-blue); margin-top: 0;">Education Portal</h2>
        <p style="color: #666;">Please enter your student PIN</p>
        <input type="password" id="pin" placeholder="••••">
        <br>
        <button onclick="checkPin()">Authorize</button>
    </div>
</div>

<div id="dashboard">
    <div style="text-align: center; margin-bottom: 40px;">
        <h1>Supplementary Learning Resources</h1>
        <p style="color: #888;">Select a module to begin simulation</p>
    </div>
    <div class="grid">
        <div class="tile" onclick="launch('https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://s3.amazonaws.com/unblocked-games/moto-x3m.xml')">
            <span class="tile-icon">🏍️</span><h3>Resource_X3M.bin</h3>
        </div>
        <div class="tile" onclick="launch('https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://cdn.jsdelivr.net/gh/M-G-3/DM@main/dm.xml')">
            <span class="tile-icon">🚗</span><h3>Resource_DM.bin</h3>
        </div>
        <div class="tile" onclick="launch('https://images-opensocial.googleusercontent.com/gadgets/ifr?url=https://cdn.jsdelivr.net/gh/sk160/gs@main/gs.xml')">
            <span class="tile-icon">🔫</span><h3>Resource_GS.bin</h3>
        </div>
        <div class="tile" onclick="launch('https://html5.gamedistribution.com/f2777099710d473484f3e582e0225f61/')">
            <span class="tile-icon">🍎</span><h3>Resource_FN.bin</h3>
        </div>
        <div class="tile" onclick="launch('https://html5.gamedistribution.com/56d0280f9e3146e297126f5d84a7e289/')">
            <span class="tile-icon">🏃</span><h3>Resource_TR2.bin</h3>
        </div>
        <div class="tile" onclick="location.reload()">
            <span class="tile-icon">🔒</span><h3>Logout</h3>
        </div>
    </div>
</div>

<div id="viewer">
    <iframe id="game-frame" allowfullscreen></iframe>
    <div class="controls">
        <button class="control-btn" onclick="toggleFS()">Fullscreen</button>
        <button class="control-btn" onclick="closeGame()">Close File</button>
    </div>
</div>

<div id="panic-overlay">
    <iframe src="https://www.transum.org/Software/SW/Starter_of_the_day/Students/Equations.asp?Level=1" style="width:100%; height:100%; border:none;"></iframe>
</div>

<script>
    function checkPin() {
        if(document.getElementById('pin').value === '1234') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.title = "Math Quiz: Equations";
        } else { alert("Invalid PIN"); }
    }

    function launch(url) {
        document.getElementById('game-frame').src = url;
        document.getElementById('viewer').style.display = 'block';
    }

    function closeGame() {
        document.getElementById('viewer').style.display = 'none';
        document.getElementById('game-frame').src = '';
    }

    function toggleFS() {
        let f = document.getElementById('game-frame');
        if (f.requestFullscreen) f.requestFullscreen();
        else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen();
    }

    let panicked = false;
    function togglePanic() {
        panicked = !panicked;
        document.getElementById('panic-overlay').style.display = panicked ? 'block' : 'none';
    }

    window.onkeydown = (e) => {
        if(e.key === 'Escape' || e.key === '`') togglePanic();
    }
</script>
</body>
</html>
