<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #ffffff;
            color: #3c4043;
        }

        /* Top Navigation Bar */
        .header {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            border-bottom: 1px solid #e0e0e0;
            height: 48px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 24px;
            height: 24px;
        }

        .header-title {
            font-size: 22px;
            color: #5f6368;
            font-weight: 400;
        }

        /* Classroom Grid Layout */
        .main-content {
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .class-card {
            border: 1px solid #dadce0;
            border-radius: 8px;
            overflow: hidden;
            height: 280px;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            position: relative;
        }

        .card-top {
            height: 100px;
            background-size: cover;
            background-position: center;
            padding: 16px;
            color: white;
            position: relative;
        }

        /* REAL GAME IMAGES MASKED AS CLASSES */
        /* Minecraft disguised as Engineering */
        .game-1 { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png'); }
        /* Among Us disguised as Psychology */
        .game-2 { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://upload.wikimedia.org/wikipedia/en/a/a5/Among_Us_Icon.png'); }
        /* Roblox disguised as Game Theory */
        .game-3 { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg'); background-color: #222; }

        .class-name {
            font-size: 20px;
            margin: 0;
            font-weight: 500;
            text-decoration: underline;
        }

        .section-name {
            font-size: 14px;
            margin-top: 4px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            position: absolute;
            right: 16px;
            top: 70px;
            border: 2px solid white;
            background-color: #ddd;
        }

        .card-bottom {
            flex-grow: 1;
            padding: 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <span style="font-size:24px; color:#5f6368; cursor:pointer;">&#9776;</span>
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Google_Classroom_Logo.png" class="logo-img" alt="Google Classroom">
            <span class="header-title">Google Classroom</span>
        </div>
    </header>

    <main class="main-content">
        
        <a href="https://minecraft.net" class="class-card">
            <div class="card-top game-1">
                <h2 class="class-name">Structural Engineering</h2>
                <div class="section-name">Period 1 - Building Blocks</div>
                <div class="avatar"></div>
            </div>
            <div class="card-bottom"></div>
        </a>

        <a href="#" class="class-card">
            <div class="card-top game-2">
                <h2 class="class-name">Social Psychology</h2>
                <div class="section-name">Period 3 - Social Deduction</div>
                <div class="avatar"></div>
            </div>
            <div class="card-bottom"></div>
        </a>

        <a href="#" class="class-card">
            <div class="card-top game-3">
                <h2 class="class-name">Game Theory & Logic</h2>
                <div class="section-name">Period 4 - User Development</div>
                <div class="avatar"></div>
            </div>
            <div class="card-bottom"></div>
        </a>

    </main>

</body>
</html>
